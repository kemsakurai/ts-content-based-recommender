# TypeScript Content Based Recommenderのテストワークフロー
# 複数のNode.jsバージョンでビルドとテストを実行

name: Node.js CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run type check
      run: npm run tsc

    - name: Run linter
      run: npm run lint

    - name: Build package
      run: npm run build

    - name: Run tests
      run: npm test
      env:
        # 埋め込みテストはモデルのダウンロードが発生するため CI ではスキップする
        SKIP_EMBEDDING_TESTS: 'true'

  # 日本語形態素解析器（kuromoji）の動作確認
  japanese-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build package
      run: npm run build

    - name: Run Japanese language tests
      run: npm test -- --grep "Japanese"
      env:
        # 埋め込みテストはモデルのダウンロードが発生するため CI ではスキップする
        SKIP_EMBEDDING_TESTS: 'true'

    - name: Run example with Japanese documents
      run: npm run example
